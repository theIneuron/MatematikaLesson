<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dars01 · 3D hook demo</title>
  <style>
    :root { --bg:#F6F4EF; --ink:#0E0E10; --ink2:#5A5A60; --accent:#fe5b1a; --soft:#FFE8E1; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
      font-family: 'Manrope', system-ui, sans-serif; display:flex; align-items:center;
      justify-content:center; padding:24px; }
    .card { width:min(760px,100%); background:#fff; border-radius:24px; padding:18px;
      box-shadow:0 20px 60px -20px rgba(20,20,30,.35); }
    .eyebrow { display:inline-block; background:var(--soft); color:var(--accent);
      font-weight:800; font-size:13px; padding:5px 14px; border-radius:999px; }
    h1 { font-size:clamp(18px,3vw,24px); margin:12px 2px 14px; font-weight:800; }
    .frame { position:relative; border-radius:18px; overflow:hidden;
      background:radial-gradient(120% 120% at 30% 20%, #10142a 0%, #05060f 70%);
      aspect-ratio:16/10; }
    #stage { position:absolute; inset:0; }
    #stage canvas { display:block; width:100%; height:100%; }
    .q { text-align:center; color:var(--ink2); font-weight:600; margin:14px 0 12px;
      font-size:clamp(15px,2vw,18px); }
    .controls { display:flex; justify-content:center; gap:10px; }
    #gatherBtn { border:none; cursor:pointer; font-weight:800; font-size:15px;
      padding:12px 22px; border-radius:14px; background:#fff; color:var(--ink);
      box-shadow:inset 0 0 0 2px rgba(167,166,162,.5); transition:all .2s; }
    #gatherBtn.on { background:var(--accent); color:#fff; box-shadow:0 8px 20px -6px rgba(254,91,26,.6); }
    .hint { text-align:center; color:#A7A6A2; font-size:12px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Mavzu: O'nliklar va birliklar</span>
    <h1>Bit koinotda quvvatsiz qoldi. Batareyalarni qanday yig'amiz?</h1>
    <div class="frame"><div id="stage"></div></div>
    <p class="q">O'nta birlik (batareya) bitta o'nlik (kasseta) bo'ladi.</p>
    <div class="controls">
      <button id="gatherBtn">O'nlikka yig'ish</button>
    </div>
    <p class="hint">Sichqoncha bilan aylantiring · g'ildirak bilan yaqinlashtiring</p>
  </div>
  <script type="module" src="/src/demo/dars01_3d.js"></script>
</body>
</html>
